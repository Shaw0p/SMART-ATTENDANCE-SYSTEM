# ─── H2 File-Based (data persists between restarts) ─────────────────────────
spring.datasource.url=jdbc:h2:file:./data/srats_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── MySQL (switch to this for production) ────────────────────────────────────
# spring.datasource.url=jdbc:mysql://localhost:3306/srats_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── JWT ─────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:change-me-in-env}
jwt.expiration=86400000

# ─── Jackson ─────────────────────────────────────────────────────────────────
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Actuator (health endpoint for network diagnostics) ──────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.org.springframework.security=WARN
logging.level.com.srats=INFO

# ─── Google Auth ─────────────────────────────────────────────────────────────
google.client.id=593294445694-dis0dk8c396u4q48dmluigst2dai958c.apps.googleusercontent.com
google.client.secret=${GOOGLE_CLIENT_SECRET:}
