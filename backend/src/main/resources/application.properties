# ─── DATABASE CONFIGURATION ──────────────────────────────────────────────────
# Default to H2 for local dev, but use environment variables for Production (MySQL)
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/srats_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.H2Dialect}

# ─── JPA ─────────────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── SERVER ──────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ─── JWT SECURITY ────────────────────────────────────────────────────────────
# Use a long random string in production via JWT_SECRET environment variable
jwt.secret=${JWT_SECRET:dev-secret-key-make-it-longer-for-production-deployment-12345}
jwt.expiration=86400000

# ─── GOOGLE AUTH ─────────────────────────────────────────────────────────────
google.client.id=${GOOGLE_CLIENT_ID:593294445694-dis0dk8c396u4q48dmluigst2dai958c.apps.googleusercontent.com}
google.client.secret=${GOOGLE_CLIENT_SECRET:}

# ─── DIAGNOSTICS & LOGGING ───────────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
logging.level.org.springframework.security=WARN
logging.level.com.srats=INFO

